<!DOCTYPE html>
<html>

<head>

	<!--
      The exp.html is the main form that
      controls the experiment.

      see comments throughout for advice
    -->
	<!-- libraries used in your experiment
		psiturk specifically depends on underscore.js, backbone.js and jquery
  	-->
	<title>My experiment</title>
	<!--<canvas id="canvas" width="1200" height="800" style="background: color #ffffff;"></canvas>-->
	<script src="/static/lib/jquery-3.4.1.min.js" type="text/javascript"> </script>
	<script src="/static/lib/underscore-min.js" type="text/javascript"> </script>
	<script src="/static/lib/backbone-min.js" type="text/javascript"> </script>

	<!-- jspsych plugins -->
	<script src="/static/js/jspsych-7.3/jspsych.js"></script>
	<script src="/static/js/jspsych-7.3/plugin-html-keyboard-response.js" type="text/javascript"></script>
	<script src="/static/js/jspsych-7.3/plugin-fullscreen.js" type="text/javascript"></script>
	<script src="/static/js/jspsych-7.3/plugin-survey-multi-choice.js" type="text/javascript"></script>
	<script src="/static/js/jspsych-7.3/plugin-html-button-response.js" type="text/javascript"></script>
	<script src="/static/js/jspsych-7.3/plugin-call-function.js" type="text/javascript"></script>
	<script src="/static/js/jspsych-7.3/plugin-gacha-BDM-slider.js?v={{ codeversion }}" type="text/javascript"></script>
	<script src="/static/js/jspsych-7.3/plugin-instructions-myversion.js" type="text/javascript"></script>

	<link href="/static/js/jspsych-7.3/jspsych.css" rel="stylesheet" type="text/css">


	<script type="text/javascript">
		// These fields provided by the psiTurk Server
		var uniqueId = "{{ uniqueId }}";  // a unique string identifying the worker/task
		var condition = "{{ condition }}"; // the condition number
		var counterbalance = "{{ counterbalance }}"; // a number indexing counterbalancing conditions
		var codeversion = "{{ codeversion }}"; // a string representing the current experiment version
		var contact_address = "{{ contact_address }}"; // your email address
		var adServerLoc = "{{ adServerLoc }}"; // the location of your ad (so you can send user back at end of experiment)
		var mode = "{{ mode }}";
	</script>

	<!-- utils.js and psiturk.js provide the basic psiturk functionality -->
	<script src="/static/js/config.js" type="text/javascript"></script>
	<script src="/static/js/utils.js" type="text/javascript"> </script>
	<script src="/static/js/psiturk.js" type="text/javascript"> </script>
	<script src="/static/js/instructions.js?v={{ codeversion }}" type="text/javascript"> </script>
	<script src="/static/js/questions.js" type="text/javascript"> </script>

	<!-- task.js is where you experiment code actually lives
			for most purposes this is where you want to focus debugging, development, etc...
		-->
	<script src="/static/js/task.js?v={{ codeversion }}" type="text/javascript"> </script>
	
	<link rel="stylesheet" href="/static/css/mystyles.css" type="text/css" />
	<link rel="stylesheet" href="/static/css/bootstrap.min.css" type="text/css" />
	<link rel="stylesheet" href="/static/css/style.css" type="text/css" />

</head>

<body>
	<noscript>
		<h1>Warning: Javascript seems to be disabled</h1>
		<p>This website requires that Javascript be enabled on your browser.</p>
		<p>Instructions for enabling Javascript in your browser can be found
			<a href="http://support.google.com/bin/answer.py?hl=en&answer=23852">here</a>
		</p>
	</noscript>
</body>

</html>
